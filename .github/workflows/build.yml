name: Build Headpat Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install PlatformIO packages
        run: pio pkg install

      - name: Build firmware
        run: pio run

      - name: Convert to UF2
        run: |
          pip install intelhex
          wget -q https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py
          wget -q https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json
          HEX=$(find .pio/build -name "firmware.hex" | head -1)
          python uf2conv.py "$HEX" -c -b 0x26000 -f 0xADA52840 -o headpat-firmware.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: headpat-firmware
          path: headpat-firmware.uf2

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: headpat-firmware.uf2
          generate_release_notes: true
