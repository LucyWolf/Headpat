name: Build Headpat Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Convert to UF2
        run: |
          python ~/.platformio/packages/framework-arduinoadafruitnrf52/tools/uf2conv/uf2conv.py \
            --family 0xADA52840 -c \
            -o headpat-firmware.uf2 \
            .pio/build/nicenano/firmware.hex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: headpat-firmware
          path: headpat-firmware.uf2

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: headpat-firmware.uf2
          generate_release_notes: true
